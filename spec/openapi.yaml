    "SeveritySummary": {
      "properties": {
        "additionalCount": {
          "description": "Count of additional flags beyond the dominant one. Counts red + yellow only;\ngray (NEW/NORMAL) never contributes. Capped at 9.",
          "example": 0,
          "type": "integer"
        },
        "dominantLabel": {
          "description": "Highest-priority flag, used as the cell label. Priority (highest → lowest):\nPAST_DUE > ABOVE_USUAL > BELOW_USUAL > BIG_GAP > NEW_CURRENCY > SLIGHT_JUMP > LATE >\nEARLY_BILL > NEW_TERMS > TAX_TYPE > NEW_GST > NEW_COA > NEW_ITEM > NEW > NORMAL.\nNO_ALERTS is the failure-state sentinel emitted when compute could not produce a\nverdict; never produced by the priority chain.",
          "enum": [
            "PAST_DUE",
            "ABOVE_USUAL",
            "BELOW_USUAL",
            "BIG_GAP",
            "NEW_CURRENCY",
            "SLIGHT_JUMP",
            "LATE",
            "EARLY_BILL",
            "NEW_TERMS",
            "TAX_TYPE",
            "NEW_GST",
            "NEW_COA",
            "NEW_ITEM",
            "NORMAL",
            "NEW",
            "NO_ALERTS"
          ],
          "example": "PAST_DUE",
          "type": "string"
        },
        "high": {
          "description": "Count of red flags: PAST_DUE, ABOVE_USUAL, BELOW_USUAL, BIG_GAP, NEW_CURRENCY",
          "example": 1,
          "type": "integer"
        },
        "info": {
          "description": "Reserved for V2 gray-flag aggregation. Always 0 in V1.",
          "example": 0,
          "type": "integer"
        },
        "medium": {
          "description": "Count of yellow flags: SLIGHT_JUMP, LATE, EARLY_BILL, NEW_TERMS, TAX_TYPE, NEW_GST,\nNEW_COA, NEW_ITEM",
          "example": 0,
          "type": "integer"
        }
      },
      "type": "object"
    },
